<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Ordering App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Smythe&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div class="hero-content">
          <h1>Jimmy's Diner</h1>
          <p>The best burgers and pizzas in town.</p>
        </div>
      </header>

      <main class="menu">
        <div class="menu-item">
          <div class="left">
            <div class="emoji">🍕</div>
            <div class="info">
              <h2>Pizza</h2>
              <p>pepperoni,mushroom,mozarella</p>
              <span class="price">$14</span>
            </div>
          </div>
          <button class="add-btn" data-id="1">+</button>
        </div>

        <hr />

        <div class="menu-item">
          <div class="left">
            <div class="emoji">🍔</div>
            <div class="info">
              <h2>Hamburger</h2>
              <p>beef, cheese, lettuce</p>
              <span class="price">$12</span>
            </div>
          </div>
          <button class="add-btn" data-id="2">+</button>
        </div>

        <hr />

        <div class="menu-item">
          <div class="left">
            <div class="emoji">🍺</div>
            <div class="info">
              <h2>Beer</h2>
              <p>grain, hops, yeast, water</p>
              <span class="price">$12</span>
            </div>
          </div>
          <button class="add-btn" data-id="3">+</button>
        </div>
      </main>
      <div class="order-section" id="order-section">
        <h2 class="order-title">Your order</h2>

        <div class="order-items" id="order-items"></div>

        <div class="divider"></div>

        <div class="total-row">
          <span>Total price:</span>
          <span id="total-price">$0</span>
        </div>

        <button class="complete-btn" id="complete-btn">Complete order</button>
      </div>

      <div class="modal-overlay hidden" id="payment-modal">
        <div class="modal-box">
          <h2 class="modal-title">Enter card details</h2>
          <form action="#">
            <input
              type="text"
              id="name-input"
              placeholder="Enter your name"
              required
            />
            <input
              type="text"
              id="card-input"
              placeholder="Enter card number"
              required
            />
            <input
              type="text"
              id="cvv-input"
              placeholder="Enter CVV"
              required
            />

            <button class="pay-btn" type="submit">Pay</button>
          </form>
        </div>
      </div>
      <div class="success-message" id="success-message">
        <p>Thanks, James! Your order is on its way!</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
